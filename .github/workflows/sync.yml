name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0 点执行（可根据需要调整）
  workflow_dispatch: # 手动触发开关

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }} # 仅在 Fork 仓库执行

    steps:
      # 步骤 1：检出当前仓库代码
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 拉取所有历史，确保同步完整

      # 步骤 2：执行同步操作
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: cf-pages/Telegraph-Image # 上游仓库地址
          upstream_sync_branch: main # 上游同步分支
          target_sync_branch: main # 本地同步分支
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动生成的 Token，无需手动配置
          test_mode: false # 关闭测试模式，执行真实同步

      # 步骤 3：同步失败时输出提示
      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 由于上游仓库的 workflow 文件变更，导致 GitHub 自动暂停了本次自动更新，你需要手动 Sync Fork 一次，详细教程请查看：https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/working-with-forks/syncing-a-fork"
          echo "[Error] Due to a change in the workflow file of the upstream repository, GitHub has automatically suspended the scheduled automatic update. You need to manually sync your fork. Please refer to: https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/working-with-forks/syncing-a-fork"
          exit 1
